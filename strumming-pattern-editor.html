<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strumming Pattern Editor</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Roboto:wght@400;700&family=Montserrat:wght@400;700&family=Open+Sans:wght@400;700&family=Lato:wght@400;700&family=Merriweather:wght@400;700&family=Playfair+Display:wght@400;700&family=Lora:wght@400;700&family=Crimson+Text:wght@400;700&family=Roboto+Mono&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            min-height: 100vh;
            color: #000000;
        }
        #preview-container svg {
            background: transparent;
            padding: 0;
        }
        .slot-active-down {
            background-color: #2563eb !important;
            color: white !important;
            border-color: #1d4ed8 !important;
        }
        .slot-active-up {
            background-color: #f59e0b !important;
            color: white !important;
            border-color: #d97706 !important;
        }
    </style>
</head>
<body class="p-4 md:p-8 text-black">
    <div class="max-w-5xl mx-auto">
        <header class="mb-8 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold text-black">Strumming Pattern Editor</h1>
                <p class="text-black font-medium">Create and export high-quality strumming patterns for ChordPro</p>
            </div>
            <a href="index.html" class="bg-slate-200 hover:bg-slate-300 text-black px-4 py-2 rounded-lg font-bold transition-colors flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd" />
                </svg>
                Back to Studio
            </a>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Left Column: Editor -->
            <div class="lg:col-span-5 space-y-6">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                    <h2 class="text-lg font-bold text-black mb-4 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-600" viewBox="0 0 20 20" fill="currentColor">
                            <path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z" />
                        </svg>
                        Pattern Settings
                    </h2>
                    
                        <div class="space-y-4">
                            <div class="space-y-1">
                                <label class="text-[12px] font-bold text-black uppercase">Pattern Title</label>
                                <input type="text" id="strum-title" value="STRUMMING PATTERN" class="w-full border border-slate-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none text-black" oninput="updatePreview()">
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <div class="space-y-1">
                                    <label class="text-[12px] font-bold text-black uppercase">Title Font</label>
                                    <select id="font-strum-title" onchange="updatePreview()" class="w-full border border-slate-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none text-black">
                                        <option value="Inter">Inter</option>
                                        <option value="Roboto">Roboto</option>
                                        <option value="Montserrat">Montserrat</option>
                                        <option value="Open Sans">Open Sans</option>
                                        <option value="Lato">Lato</option>
                                        <option value="Merriweather">Merriweather</option>
                                        <option value="Playfair Display">Playfair Display</option>
                                        <option value="Lora">Lora</option>
                                        <option value="Crimson Text">Crimson Text</option>
                                        <option value="Roboto Mono">Roboto Mono</option>
                                    </select>
                                </div>
                                <div class="space-y-1">
                                    <label class="text-[12px] font-bold text-black uppercase">Beat Labels Font</label>
                                    <select id="font-strum-labels" onchange="updatePreview()" class="w-full border border-slate-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none text-black">
                                        <option value="Inter">Inter</option>
                                        <option value="Roboto">Roboto</option>
                                        <option value="Montserrat">Montserrat</option>
                                        <option value="Open Sans">Open Sans</option>
                                        <option value="Lato">Lato</option>
                                        <option value="Merriweather">Merriweather</option>
                                        <option value="Playfair Display">Playfair Display</option>
                                        <option value="Lora">Lora</option>
                                        <option value="Crimson Text">Crimson Text</option>
                                        <option value="Roboto Mono">Roboto Mono</option>
                                    </select>
                                </div>
                            </div>

                            <div class="space-y-1">
                                <label class="text-[12px] font-bold text-black uppercase">Time Signature</label>
                                <select id="strum-time" onchange="changeTimeSignature()" class="w-full border border-slate-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none text-black">
                                    <option value="4/4">4/4 (16 slots)</option>
                                    <option value="3/4">3/4 (12 slots)</option>
                                    <option value="6/8">6/8 (12 slots)</option>
                                </select>
                            </div>

                            <div class="space-y-1">
                                <label class="text-[12px] font-bold text-black uppercase flex justify-between">
                                    Title Font Size
                                    <input type="number" id="strum-title-size-num" value="16" min="8" max="48" step="1" class="w-12 text-right bg-transparent border-none text-black font-bold p-0 focus:ring-0" oninput="document.getElementById('strum-title-size').value = this.value; updatePreview()">
                                </label>
                                <input type="range" id="strum-title-size" min="8" max="48" step="1" value="16" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-black" oninput="document.getElementById('strum-title-size-num').value = this.value; updatePreview()">
                            </div>

                            <div class="space-y-1">
                                <label class="text-[12px] font-bold text-black uppercase flex justify-between">
                                    Beat Labels Font Size
                                    <input type="number" id="strum-labels-size-num" value="12" min="6" max="32" step="1" class="w-12 text-right bg-transparent border-none text-black font-bold p-0 focus:ring-0" oninput="document.getElementById('strum-labels-size').value = this.value; updatePreview()">
                                </label>
                                <input type="range" id="strum-labels-size" min="6" max="32" step="1" value="12" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-black" oninput="document.getElementById('strum-labels-size-num').value = this.value; updatePreview()">
                            </div>

                            <div class="space-y-1">
                                <label class="text-[12px] font-bold text-black uppercase flex justify-between">
                                    Title Vertical Pos
                                    <input type="number" id="strum-title-y-num" value="0" min="-50" max="50" step="1" class="w-12 text-right bg-transparent border-none text-black font-bold p-0 focus:ring-0" oninput="document.getElementById('strum-title-y').value = this.value; updatePreview()">
                                </label>
                                <input type="range" id="strum-title-y" min="-50" max="50" step="1" value="0" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-black" oninput="document.getElementById('strum-title-y-num').value = this.value; updatePreview()">
                            </div>

                            <div class="space-y-1">
                                <label class="text-[12px] font-bold text-black uppercase flex justify-between">
                                    Beat Labels Vertical Pos
                                    <input type="number" id="strum-labels-y-num" value="0" min="-50" max="50" step="1" class="w-12 text-right bg-transparent border-none text-black font-bold p-0 focus:ring-0" oninput="document.getElementById('strum-labels-y').value = this.value; updatePreview()">
                                </label>
                                <input type="range" id="strum-labels-y" min="-50" max="50" step="1" value="0" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-black" oninput="document.getElementById('strum-labels-y-num').value = this.value; updatePreview()">
                            </div>

                            <div class="space-y-1">
                                <label class="text-[12px] font-bold text-black uppercase flex justify-between">
                                    Beam Vertical Pos
                                    <input type="number" id="strum-beam-y-num" value="2" min="-20" max="40" step="1" class="w-12 text-right bg-transparent border-none text-black font-bold p-0 focus:ring-0" oninput="document.getElementById('strum-beam-y').value = this.value; updatePreview()">
                                </label>
                                <input type="range" id="strum-beam-y" min="-20" max="40" step="1" value="2" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-black" oninput="document.getElementById('strum-beam-y-num').value = this.value; updatePreview()">
                            </div>

                            <div class="space-y-1">
                                <label class="text-[12px] font-bold text-black uppercase flex justify-between">
                                    Rhythm Gap
                                    <input type="number" id="strum-gap-num" value="2" min="0" max="40" step="1" class="w-12 text-right bg-transparent border-none text-black font-bold p-0 focus:ring-0" oninput="document.getElementById('strum-gap').value = this.value; updatePreview()">
                                </label>
                                <input type="range" id="strum-gap" min="0" max="40" step="1" value="2" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-black" oninput="document.getElementById('strum-gap-num').value = this.value; updatePreview()">
                            </div>

                            <div class="space-y-1">
                                <label class="text-[12px] font-bold text-black uppercase flex justify-between">
                                    Strum Scale
                                    <input type="number" id="strum-scale-num" value="1.0" min="0.5" max="3" step="0.1" class="w-12 text-right bg-transparent border-none text-black font-bold p-0 focus:ring-0" oninput="document.getElementById('strum-scale').value = this.value; updatePreview()">
                                </label>
                                <input type="range" id="strum-scale" min="0.5" max="3" step="0.1" value="1" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-black" oninput="document.getElementById('strum-scale-num').value = parseFloat(this.value).toFixed(1); updatePreview()">
                            </div>

                            <div class="flex items-center gap-3 p-3 bg-slate-50 rounded-lg border border-slate-100">
                                <label class="flex items-center gap-2 cursor-pointer group">
                                    <input type="checkbox" id="strum-colorized" class="w-4 h-4 accent-blue-600 rounded" onchange="updatePreview()">
                                    <span class="text-sm font-bold text-black uppercase group-hover:text-blue-600 transition-colors">Colorized Arrows</span>
                                </label>
                            </div>
                        </div>
                </div>

                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                    <h2 class="text-lg font-bold text-black mb-4 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-600" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M3 5a2 2 0 012-2h10a2 2 0 012 2v10a2 2 0 01-2 2H5a2 2 0 01-2-2V5zm11 1H6v8l4-2 4 2V6z" clip-rule="evenodd" />
                        </svg>
                        Interactive Grid
                    </h2>
                    
                    <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
                        <div id="strum-grid" class="grid grid-cols-8 gap-2 mb-4">
                            <!-- Slots injected here -->
                        </div>
                        
                        <div class="flex flex-wrap items-center gap-4 pt-2 border-t border-slate-200">
                            <div class="flex items-center gap-2">
                                <div class="w-3 h-3 bg-blue-600 rounded-full"></div>
                                <span class="text-[12px] font-bold uppercase text-black">Down (↓)</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <div class="w-3 h-3 bg-amber-500 rounded-full"></div>
                                <span class="text-[12px] font-bold uppercase text-black">Up (↑)</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <div class="w-3 h-3 bg-white border border-slate-300 rounded-full"></div>
                                <span class="text-[12px] font-bold uppercase text-black">None</span>
                            </div>
                        </div>
                    </div>
                    
                    <button onclick="clearStrumming()" class="w-full mt-4 bg-slate-100 hover:bg-slate-200 text-black py-2.5 rounded-lg font-bold transition-all flex items-center justify-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z" clip-rule="evenodd" />
                        </svg>
                        Reset Pattern
                    </button>
                </div>
            </div>

            <!-- Right Column: Preview & Export -->
            <div class="lg:col-span-7 space-y-6">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-lg font-bold text-black flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-600" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm12 12H4l4-8 3 6 2-4 3 6z" clip-rule="evenodd" />
                            </svg>
                            Live Preview
                        </h2>
                        <div class="flex gap-2">
                            <button onclick="downloadPNG()" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded text-xs font-bold transition-colors flex items-center gap-1.5">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" viewBox="0 0 20 20" fill="currentColor">
                                    <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd" />
                                </svg>
                                PNG
                            </button>
                            <button onclick="downloadSVG()" class="bg-slate-800 hover:bg-slate-900 text-white px-3 py-1.5 rounded text-xs font-bold transition-colors flex items-center gap-1.5">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" viewBox="0 0 20 20" fill="currentColor">
                                    <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd" />
                                </svg>
                                SVG
                            </button>
                        </div>
                    </div>
                    
                    <div id="preview-container" class="bg-white p-2 flex items-start justify-center overflow-auto">
                        <!-- SVG Preview injected here -->
                    </div>
                </div>

                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-lg font-bold text-black flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-black" viewBox="0 0 20 20" fill="currentColor">
                                <path d="M8 3a1 1 0 011-1h2a1 1 0 110 2H9a1 1 0 01-1-1z" />
                                <path d="M6 3a2 2 0 00-2 2v11a2 2 0 002 2h8a2 2 0 002-2V5a2 2 0 00-2-2 3 3 0 01-3 3H9a3 3 0 01-3-3z" />
                            </svg>
                            ChordPro Directive
                        </h2>
                        <button onclick="copyDirective()" class="text-black hover:text-slate-700 text-sm font-bold flex items-center gap-1 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                                <path d="M8 3a1 1 0 011-1h2a1 1 0 110 2H9a1 1 0 01-1-1z" />
                                <path d="M6 3a2 2 0 00-2 2v11a2 2 0 002 2h8a2 2 0 002-2V5a2 2 0 00-2-2 3 3 0 01-3 3H9a3 3 0 01-3-3z" />
                            </svg>
                            Copy to Clipboard
                        </button>
                    </div>
                    <div class="bg-slate-900 rounded-lg p-4 font-mono text-white text-sm break-all" id="directive-output">
                        {strumming: bpm=82, time=4/4, pattern=D.D.D.D.D.D.D.D.}
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-full font-bold shadow-2xl opacity-0 pointer-events-none transition-all duration-300 transform translate-y-4 z-50">
        Copied to clipboard!
    </div>

    <script>
        let currentStrummingPattern = Array(16).fill('.');

        function changeTimeSignature() {
            const time = document.getElementById('strum-time').value;
            let length = 16;
            if (time === '3/4') length = 12;
            if (time === '6/8') length = 12;
            
            currentStrummingPattern = Array(length).fill('.');
            initStrummingGrid();
            updatePreview();
        }

        function initStrummingGrid() {
            const grid = document.getElementById('strum-grid');
            grid.innerHTML = '';
            
            const length = currentStrummingPattern.length;
            const time = document.getElementById('strum-time').value;
            
            if (length === 16) grid.className = 'grid grid-cols-8 gap-2 mb-2';
            else if (length === 12) grid.className = 'grid grid-cols-6 gap-2 mb-2';
            else grid.className = 'grid grid-cols-4 gap-2 mb-2';

            let labels = [];
            if (length === 16) labels = ['1', 'e', '&', 'e', '2', 'e', '&', 'e', '3', 'e', '&', 'e', '4', 'e', '&', 'e'];
            else if (length === 12) {
                if (time === '6/8') labels = ['1', '&', '2', '&', '3', '&', '4', '&', '5', '&', '6', '&'];
                else labels = ['1', 'e', '&', 'e', '2', 'e', '&', 'e', '3', 'e', '&', 'e'];
            }

            for (let i = 0; i < length; i++) {
                const container = document.createElement('div');
                container.className = 'flex flex-col items-center gap-1';
                
                const label = document.createElement('span');
                label.className = 'text-[12px] font-bold text-black uppercase';
                label.innerText = labels[i] || '';
                
                const slot = document.createElement('div');
                slot.className = 'w-8 h-8 border border-slate-300 rounded-lg flex items-center justify-center cursor-pointer hover:bg-slate-100 transition-all text-sm font-bold shadow-sm';
                slot.dataset.index = i;
                slot.onclick = () => toggleStrumSlot(i);
                updateStrumSlotUI(slot, i);
                
                container.appendChild(label);
                container.appendChild(slot);
                grid.appendChild(container);
            }
        }

        function toggleStrumSlot(index) {
            const current = currentStrummingPattern[index];
            if (current === '.') currentStrummingPattern[index] = 'D';
            else if (current === 'D') currentStrummingPattern[index] = 'U';
            else currentStrummingPattern[index] = '.';
            
            const slot = document.querySelector(`[data-index="${index}"]`);
            updateStrumSlotUI(slot, index);
            updatePreview();
        }

        function updateStrumSlotUI(slot, index) {
            const val = currentStrummingPattern[index];
            slot.innerHTML = val === 'D' ? '↓' : (val === 'U' ? '↑' : '');
            
            slot.className = 'w-8 h-8 border rounded-lg flex items-center justify-center cursor-pointer transition-all text-sm font-bold shadow-sm ';
            if (val === 'D') {
                slot.classList.add('slot-active-down');
            } else if (val === 'U') {
                slot.classList.add('slot-active-up');
            } else {
                slot.classList.add('bg-white', 'text-slate-700', 'border-slate-300', 'hover:bg-slate-50');
            }
        }

        function clearStrumming() {
            const length = currentStrummingPattern.length;
            currentStrummingPattern = Array(length).fill('.');
            initStrummingGrid();
            updatePreview();
        }

        function renderStrummingSVG(pattern, time = '4/4') {
            const len = pattern.length || 16;
            let beats = 4;
            let slotsPerBeat = 4;
            let labels = ['1', '2', '3', '4', '5', '6', '7', '8'];
            let subLabels = ['e', '&', 'e'];
            
            const scale = parseFloat(document.getElementById('strum-scale').value || '1');
            
            // FIXED Margins and Gaps (These do NOT scale)
            const marginX = 2;
            const marginY = 1;
            const textGap = 1;
            const headerToPatternGap = 2;
            
            // Scaled sizes for musical elements
            const slotGap = 22 * scale;
            const headSize = 6 * scale;
            const arrowHeight = 35 * scale;
            const stemHeight = 30 * scale;
            
            // Scaled font sizes
            const baseTitleSize = parseFloat(document.getElementById('strum-title-size').value || '16');
            const titleSize = baseTitleSize * scale;
            const baseLabelSize = parseFloat(document.getElementById('strum-labels-size').value || '12');
            const labelSize = baseLabelSize * scale;

            const startX = marginX + headSize; // Room for arrow head
            
            if (time === '3/4' || len === 12 && time !== '6/8') {
                beats = 3;
                slotsPerBeat = 4;
                subLabels = ['e', '&', 'e'];
            } else if (time === '6/8' || len === 6 || (len === 12 && time === '6/8')) {
                beats = 6;
                slotsPerBeat = 2;
                subLabels = ['&'];
            } else if (len === 8) {
                beats = 2;
                slotsPerBeat = 4;
            } else if (len % 4 === 0) {
                beats = len / 4;
                slotsPerBeat = 4;
            } else {
                beats = len;
                slotsPerBeat = 1;
                subLabels = [];
            }
            
            // Calculate width based on scaled content
            const lastGroupX = startX + (beats - 1) * slotGap * slotsPerBeat * 1.2;
            const lastSlotX = lastGroupX + (slotsPerBeat - 1) * slotGap;
            const width = lastSlotX + headSize + marginX;
            
            // Font settings
            const titleText = document.getElementById('strum-title').value || 'STRUMMING PATTERN';
            const titleFont = document.getElementById('font-strum-title').value || 'Inter';
            const labelFont = document.getElementById('font-strum-labels').value || 'Inter';
            
            // Vertical spacing - TIGHTER offsets
            const titleYOffset = parseInt(document.getElementById('strum-title-y').value || '0');
            const titleYBase = marginY + titleSize * 0.8;
            const titleY = titleYBase + titleYOffset;
            const arrowTop = titleYBase + headerToPatternGap; 
            const arrowBottom = arrowTop + arrowHeight;
            
            // Rhythm gap is a direct pixel value from slider
            const rhythmGapValue = parseInt(document.getElementById('strum-gap').value || '2');
            const labelYOffset = parseInt(document.getElementById('strum-labels-y').value || '0');
            const labelY = arrowBottom + rhythmGapValue + (labelSize * 0.8) + labelYOffset;
            
            const beamYOffset = parseInt(document.getElementById('strum-beam-y').value || '2');
            const stemTop = labelY + beamYOffset;
            const beam1Y = stemTop + (stemHeight * 0.5);
            const beam2Y = stemTop + (stemHeight * 0.8);
            const stemBottom = beam2Y; 

            // Calculate vertical bounds to prevent clipping when title is moved
            // titleY is the baseline, so we check titleY - titleSize for the top
            const minY = Math.min(0, titleY - titleSize);
            const maxY = Math.max(stemBottom + marginY, titleY + marginY);
            const finalHeight = maxY - minY;

            let svg = `<svg width="${width}" height="${finalHeight}" viewBox="0 ${minY} ${width} ${finalHeight}" xmlns="http://www.w3.org/2000/svg" style="background: transparent;" text-rendering="geometricPrecision">`;
            
            // Title & Time Signature (Combined on one line to save space)
            const timeSig = document.getElementById('strum-time').value || '4/4';
            svg += `<text x="${startX}" y="${titleY}" font-family="${titleFont}, sans-serif" font-size="${titleSize}" font-weight="700" fill="#000000">${titleText} <tspan font-family="${labelFont}, sans-serif" font-size="${labelSize}" font-weight="600" fill="#64748b" dx="8">${timeSig}</tspan></text>`;

            const isColorized = document.getElementById('strum-colorized').checked || false;

            for (let i = 0; i < beats; i++) {
                const groupX = startX + i * slotGap * slotsPerBeat * 1.2;
                
                for (let j = 0; j < slotsPerBeat; j++) {
                    const x = groupX + j * slotGap;
                    const index = i * slotsPerBeat + j;
                    const char = pattern[index] || '.';
                    
                    let labelText = '';
                    if (j === 0) labelText = labels[i];
                    else if (subLabels.length > 0) labelText = subLabels[j-1];
                    
                    if (labelText) {
                        svg += `<text x="${x}" y="${labelY}" text-anchor="middle" font-family="${labelFont}, sans-serif" font-size="${labelSize}" font-weight="700" fill="#000000">${labelText}</text>`;
                    }
                    
                    let arrowColor = "#000000";
                    if (isColorized) {
                        if (char === 'D') arrowColor = "#2563eb";
                        else if (char === 'U') arrowColor = "#f59e0b";
                    }
                    
                    const hOffset = 10 * scale;
                    const strokeWidth = 2.5 * scale;

                    if (char === 'D') {
                        svg += `<path d="M${x},${arrowTop} L${x},${arrowBottom} M${x-headSize},${arrowBottom - hOffset} L${x},${arrowBottom} L${x+headSize},${arrowBottom - hOffset}" stroke="${arrowColor}" stroke-width="${strokeWidth}" fill="none" stroke-linecap="round" stroke-linejoin="round" />`;
                    } else if (char === 'U') {
                        svg += `<path d="M${x},${arrowBottom} L${x},${arrowTop} M${x-headSize},${arrowTop + hOffset} L${x},${arrowTop} L${x+headSize},${arrowTop + hOffset}" stroke="${arrowColor}" stroke-width="${strokeWidth}" fill="none" stroke-linecap="round" stroke-linejoin="round" />`;
                    }
                    
                    svg += `<line x1="${x}" y1="${stemTop}" x2="${x}" y2="${stemBottom}" stroke="#000000" stroke-width="${1.5 * scale}" />`;
                }
                
                if (slotsPerBeat > 1) {
                    const xStart = groupX;
                    const xEnd = groupX + (slotsPerBeat - 1) * slotGap;
                    svg += `<line x1="${xStart}" y1="${beam1Y}" x2="${xEnd}" y2="${beam1Y}" stroke="#000000" stroke-width="${3.5 * scale}" />`;
                    svg += `<line x1="${xStart}" y1="${beam2Y}" x2="${xEnd}" y2="${beam2Y}" stroke="#000000" stroke-width="${3.5 * scale}" />`;
                }
            }
            
            svg += `</svg>`;
            return svg;
        }

        function updatePreview() {
            const time = document.getElementById('strum-time').value || '4/4';
            const pattern = currentStrummingPattern.join('');
            
            const svg = renderStrummingSVG(pattern, time);
            document.getElementById('preview-container').innerHTML = svg;
            
            const directive = `{strumming: time=${time}, pattern=${pattern}}`;
            document.getElementById('directive-output').innerText = directive;
        }

        function copyDirective() {
            const text = document.getElementById('directive-output').innerText;
            navigator.clipboard.writeText(text).then(() => {
                showToast('Directive copied!');
            });
        }

        function downloadSVG() {
            const svgData = document.getElementById('preview-container').innerHTML;
            const blob = new Blob([svgData], {type: 'image/svg+xml;charset=utf-8'});
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `strumming-pattern.svg`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function downloadPNG() {
            const svgElement = document.querySelector('#preview-container svg');
            const svgData = new XMLSerializer().serializeToString(svgElement);
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            const scale = 4; 
            const width = svgElement.width.baseVal.value;
            const height = svgElement.height.baseVal.value;
            
            canvas.width = width * scale;
            canvas.height = height * scale;
            
            const img = new Image();
            const svgBlob = new Blob([svgData], {type: 'image/svg+xml;charset=utf-8'});
            const url = URL.createObjectURL(svgBlob);
            
            img.onload = function() {
                ctx.fillStyle = "white";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.scale(scale, scale);
                ctx.drawImage(img, 0, 0);
                
                const pngUrl = canvas.toDataURL("image/png");
                const link = document.createElement('a');
                link.href = pngUrl;
                link.download = `strumming-pattern.png`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            };
            img.src = url;
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.style.opacity = '1';
            toast.style.transform = 'translate(-50%, 0)';
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translate(-50%, 1rem)';
            }, 2000);
        }

        // Initialize
        initStrummingGrid();
        updatePreview();
    </script>
</body>
</html>
